name: Build and Release Cluster App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: cluster/package-lock.json

      - name: Install Node dependencies
        working-directory: cluster
        run: |
          npm ci

      - name: Build frontend
        working-directory: cluster
        run: |
          npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        working-directory: cluster-End
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Copy frontend to backend
        shell: pwsh
        run: |
          if (Test-Path cluster-End/static) {
            Remove-Item -Recurse -Force cluster-End/static
          }
          Copy-Item -Recurse cluster/build cluster-End/static
          # 复制图标文件到 static 目录
          if (Test-Path cluster/public/细胞分析.png) {
            Copy-Item cluster/public/细胞分析.png cluster-End/static/细胞分析.png
          }
          if (Test-Path cluster/public/icon.ico) {
            Copy-Item cluster/public/icon.ico cluster-End/static/icon.ico
          }

      - name: Build executable
        working-directory: cluster-End
        run: python build-win.py

      - name: List dist directory
        shell: pwsh
        run: |
          Get-ChildItem -Path cluster-End/dist -Recurse

      - name: Rename executable with version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if (-not $version) {
            $version = "${{ github.event.inputs.version }}"
          }
          $source = "cluster-End/dist/cluster-app-windows-amd64.exe"
          $dest = "cluster-End/dist/cluster-app-${version}-windows-amd64.exe"
          if (Test-Path $source) {
            Rename-Item -Path $source -NewName $dest
            Write-Host "Renamed to: $dest"
          }

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.version }}
          name: Release ${{ github.ref_name || github.event.inputs.version }}
          files: cluster-End/dist/*.exe
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos-arm:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: cluster/package-lock.json

      - name: Install Node dependencies
        working-directory: cluster
        run: |
          npm ci

      - name: Build frontend
        working-directory: cluster
        run: |
          npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        working-directory: cluster-End
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Copy frontend to backend
        run: |
          rm -rf cluster-End/static
          cp -r cluster/build cluster-End/static
          # 复制图标文件到 static 目录
          if [ -f cluster/public/细胞分析.png ]; then
            cp cluster/public/细胞分析.png cluster-End/static/细胞分析.png
          fi
          if [ -f cluster/public/icon.ico ]; then
            cp cluster/public/icon.ico cluster-End/static/icon.ico
          fi

      - name: Build executable
        working-directory: cluster-End
        run: python build-macos.py arm64

      - name: List dist directory
        run: |
          ls -la cluster-End/dist/

      - name: Rename executable with version
        run: |
          VERSION="${{ github.ref_name }}"
          if [ -z "$VERSION" ]; then
            VERSION="${{ github.event.inputs.version }}"
          fi
          SOURCE="cluster-End/dist/cluster-app-macos-arm64"
          DEST="cluster-End/dist/cluster-app-${VERSION}-macos-arm64"
          if [ -f "$SOURCE" ]; then
            mv "$SOURCE" "$DEST"
            echo "Renamed to: $DEST"
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.version }}
          name: Release ${{ github.ref_name || github.event.inputs.version }}
          files: cluster-End/dist/cluster-app-*-macos-arm64
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
