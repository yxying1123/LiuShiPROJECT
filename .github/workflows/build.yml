name: Build and Release Cluster App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: cluster/package-lock.json

      - name: Install Node dependencies
        working-directory: cluster
        run: |
          npm ci

      - name: Build frontend
        working-directory: cluster
        run: |
          npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        working-directory: cluster-End
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Copy frontend to backend
        shell: pwsh
        run: |
          if (Test-Path cluster-End/static) {
            Remove-Item -Recurse -Force cluster-End/static
          }
          Copy-Item -Recurse cluster/build cluster-End/static

      - name: Build executable
        working-directory: cluster-End
        run: python build-win.py

      - name: List dist directory
        shell: pwsh
        run: |
          Get-ChildItem -Path cluster-End/dist -Recurse

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cluster-app-windows-amd64
          path: cluster-End/dist/*.exe

  build-macos-intel:
    runs-on: macos-13
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: cluster/package-lock.json

      - name: Install Node dependencies
        working-directory: cluster
        run: |
          npm ci

      - name: Build frontend
        working-directory: cluster
        run: |
          npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        working-directory: cluster-End
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Copy frontend to backend
        run: |
          rm -rf cluster-End/static
          cp -r cluster/build cluster-End/static

      - name: Build executable
        working-directory: cluster-End
        run: python build-macos.py amd64

      - name: List dist directory
        run: |
          ls -la cluster-End/dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cluster-app-macos-amd64
          path: cluster-End/dist/cluster-app-macos-amd64

  build-macos-arm:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: cluster/package-lock.json

      - name: Install Node dependencies
        working-directory: cluster
        run: |
          npm ci

      - name: Build frontend
        working-directory: cluster
        run: |
          npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        working-directory: cluster-End
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Copy frontend to backend
        run: |
          rm -rf cluster-End/static
          cp -r cluster/build cluster-End/static

      - name: Build executable
        working-directory: cluster-End
        run: python build-macos.py arm64

      - name: List dist directory
        run: |
          ls -la cluster-End/dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cluster-app-macos-arm64
          path: cluster-End/dist/cluster-app-macos-arm64

  release:
    needs: [build-windows, build-macos-intel, build-macos-arm]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: |
          echo "Downloaded artifacts:"
          find artifacts/ -type f -ls

      - name: Rename artifacts with version
        run: |
          VERSION=${{ github.ref_name || github.event.inputs.version }}
          mkdir -p release

          # Windows
          if [ -f "artifacts/cluster-app-windows-amd64/cluster-app-windows-amd64.exe" ]; then
            cp "artifacts/cluster-app-windows-amd64/cluster-app-windows-amd64.exe" "release/cluster-app-${VERSION}-windows-amd64.exe"
          fi

          # macOS Intel
          if [ -f "artifacts/cluster-app-macos-amd64/cluster-app-macos-amd64" ]; then
            cp "artifacts/cluster-app-macos-amd64/cluster-app-macos-amd64" "release/cluster-app-${VERSION}-macos-amd64"
          fi

          # macOS ARM
          if [ -f "artifacts/cluster-app-macos-arm64/cluster-app-macos-arm64" ]; then
            cp "artifacts/cluster-app-macos-arm64/cluster-app-macos-arm64" "release/cluster-app-${VERSION}-macos-arm64"
          fi

          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.version }}
          name: Release ${{ github.ref_name || github.event.inputs.version }}
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
